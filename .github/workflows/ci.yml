name: Build & Push

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*', '*.*.*' ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

env:
  PLATFORMS: linux/amd64

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.5"
      - name: Create CI .env
        run: cp .env.example .env
      - name: Validate compose
        run: docker compose config
      - name: Go fmt
        run: |
          gofmt -w cmd internal
          git diff --exit-code
      - name: Go test
        run: go test -race -coverprofile=coverage.out ./...
      - name: Coverage floor
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%", "", $3); print $3}')
          awk -v total="$total" 'BEGIN { if (total < 30) { printf "coverage %.1f%% is below 30%% floor\n", total; exit 1 } }'
      - name: Go vet
        run: go vet ./...
      - name: Shell and healthcheck validation
        run: |
          shellcheck scripts/*.sh docker/enshrouded/entrypoint.sh
          python3 -m py_compile docker/enshrouded/healthcheck.py
      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
      - name: Transactional restore drill
        run: ./scripts/restore-drill.sh

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            image: powermountain/enshrouded-dedi-server
            context: docker/enshrouded
            file: docker/enshrouded/Dockerfile
          - name: backup
            image: powermountain/enshrouded-dedi-backup
            context: .
            file: docker/backup/Dockerfile
          - name: ui
            image: powermountain/enshrouded-dedi-ui
            context: .
            file: docker/ui/Dockerfile
          - name: controller
            image: powermountain/enshrouded-dedi-controller
            context: .
            file: docker/controller/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Determine PR/fork context
        id: ctx
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.head.repo.fork }}" == "true" ]]; then
            echo "is_fork_pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_fork_pr=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Docker Hub
        if: ${{ steps.ctx.outputs.is_fork_pr != 'true' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          EVENT_NAME="${GITHUB_EVENT_NAME}"
          REF_TYPE="${GITHUB_REF_TYPE}"   # branch|tag

          # For PRs use the source branch; for pushes/tags use the ref name
          if [ "$EVENT_NAME" = "pull_request" ]; then
            SRC_NAME="${GITHUB_HEAD_REF}"
          else
            SRC_NAME="${GITHUB_REF_NAME}"  # main|dev|v1.2.3|...
          fi

          SAFE_NAME=$(echo "$SRC_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_.-]/-/g')

          if [ "$REF_TYPE" = "tag" ]; then
            VER="${SRC_NAME#v}"
            TAGS="${{ matrix.image }}:${VER},${{ matrix.image }}:latest"
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            TAGS="${{ matrix.image }}:pr-${SAFE_NAME}-${GITHUB_SHA::7}"
          elif [ "$REF_TYPE" = "branch" ] && [ "$SRC_NAME" = "main" ]; then
            TAGS="${{ matrix.image }}:main-${GITHUB_SHA::7},${{ matrix.image }}:latest"
          elif [ "$REF_TYPE" = "branch" ] && [ "$SRC_NAME" = "dev" ]; then
            TAGS="${{ matrix.image }}:dev-${GITHUB_SHA::7},${{ matrix.image }}:dev-latest"
          else
            TAGS="${{ matrix.image }}:${SAFE_NAME}-${GITHUB_SHA::7}"
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build & push (${{ matrix.name }})
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' && steps.ctx.outputs.is_fork_pr != 'true' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      - name: Read-only image smoke (${{ matrix.name }})
        if: ${{ github.event_name == 'pull_request' && (matrix.name == 'server' || matrix.name == 'ui') }}
        run: ./scripts/image-smoke.sh "${{ matrix.name }}" "${{ steps.tags.outputs.tags }}"
